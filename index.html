<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Cache Prevention -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>VR Heritage · Bulacan Historical Sites</title>
    
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <style>
        /* RESET & BASE - SAME SIMPLE STYLE AS DEL PILAR SHRINE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; 
            background: #000;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* METRICS PANEL - SIMPLE STYLE */
        #metrics-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            z-index: 10000;
            width: 280px;
            border: 1px solid #444;
            backdrop-filter: blur(5px);
        }

        .metric {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            padding: 3px 0;
            border-bottom: 1px solid #333;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #aaa;
        }

        .metric-value {
            color: white;
            font-weight: bold;
        }
        
        /* SITE INFO - SIMPLE STYLE */
        #site-info {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            color: gold;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            z-index: 10000;
            border: 1px solid gold;
            backdrop-filter: blur(5px);
        }
        
        /* BACK BUTTON - SIMPLE STYLE */
        #back-button {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            z-index: 10000;
            border: 1px solid #444;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        #back-button:hover {
            background: rgba(30, 30, 30, 0.9);
            border-color: gold;
        }
        
        /* SITE SELECTOR - SIMPLE DOTS LIKE DEL PILAR */
        .site-selector {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        
        .site-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .site-dot.active {
            background: #FFD700;
            transform: scale(1.3);
            box-shadow: 0 0 10px gold;
        }
        
        .site-dot:hover {
            background: rgba(255, 215, 0, 0.7);
            transform: scale(1.2);
        }
        
        /* LOADING - SIMPLE STYLE */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10001;
            transition: opacity 0.5s;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            #metrics-panel {
                width: 250px;
                font-size: 11px;
                padding: 12px;
            }
            
            #site-info {
                top: 15px;
                font-size: 13px;
                padding: 8px 16px;
            }
            
            .site-selector {
                bottom: 80px;
            }
            
            .site-dot {
                width: 8px;
                height: 8px;
            }
            
            #back-button {
                bottom: 15px;
                left: 15px;
                padding: 10px 16px;
                font-size: 13px;
            }
        }
        
        /* CURSOR STYLING */
        a-cursor {
            cursor: pointer;
        }
        
        /* MENU OPTION STYLES - SIMPLE AND CLEAN */
        .menu-option text {
            text-shadow: 1px 1px 2px black;
        }
        
        .menu-option:hover {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- METRICS PANEL - SIMPLE LIKE DEL PILAR -->
    <div id="metrics-panel">
        <h3 style="color: gold; margin-top: 0; margin-bottom: 5px;">📊 Session Data</h3>

        <div class="metric">
            <span class="metric-label">FPS:</span>
            <span id="fps-value" class="metric-value">--</span>
        </div>

        <div class="metric">
            <span class="metric-label">Session:</span>
            <span id="session-time" class="metric-value">00:00</span>
        </div>

        <div class="metric">
            <span class="metric-label">Selections:</span>
            <span id="selection-count" class="metric-value">0</span>
        </div>

        <div class="metric">
            <span class="metric-label">Current:</span>
            <span id="current-site" class="metric-value">Del Pilar</span>
        </div>

        <button onclick="exportData()" style="
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        ">
            📥 Export Data
        </button>
    </div>
    
    <!-- SITE INFO - SIMPLE LIKE DEL PILAR -->
    <div id="site-info">
        <span id="site-name">📍 Marcelo H. Del Pilar Shrine</span>
    </div>
    
    <!-- BACK BUTTON - SIMPLE LIKE DEL PILAR -->
    <button id="back-button" onclick="goToMenu()">
        ↩ Back
    </button>
    
    <!-- LOADING - SIMPLE LIKE DEL PILAR -->
    <div id="loading">
        <div style="
            width: 50px; 
            height: 50px; 
            border: 3px solid gold; 
            border-top: 3px solid transparent; 
            border-radius: 50%; 
            animation: spin 1s linear infinite;
        "></div>
        <div style="margin-top: 20px;">Loading VR Heritage Main Menu...</div>
        <div style="font-size: 12px; color: #aaa; margin-top: 5px;">Select a historical site to explore</div>
    </div>
    
    <!-- SITE SELECTOR DOTS - LIKE DEL PILAR SCENE SELECTOR -->
    <div class="site-selector" id="site-selector"></div>
    
    <!-- A-FRAME SCENE -->
    <a-scene cursor="rayOrigin: mouse">
        <!-- ASSETS (You'll need to create these images) -->
        <a-assets timeout="30000">
            <img id="del-pilar-bg" src="images/del-pilar-bg.jpg" crossorigin="anonymous">
            <img id="battle-quinga-bg" src="images/battle-quinga-bg.jpg" crossorigin="anonymous">
            <img id="barasoain-bg" src="images/barasoain-bg.jpg" crossorigin="anonymous">
            <img id="casa-real-bg" src="images/casa-real-bg.jpg" crossorigin="anonymous">
            <img id="bulacan-museum-bg" src="images/bulacan-museum-bg.jpg" crossorigin="anonymous">
        </a-assets>
        
        <!-- SKY - Will be set by JavaScript -->
        <a-sky id="scene-sky" src="#del-pilar-bg"></a-sky>
        
        <!-- CAMERA WITH CURSOR -->
        <a-entity camera look-controls>
            <a-cursor 
                animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
                animation__fusing="property: scale; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500"
                fuse="true"
                fuse-timeout="500">
            </a-cursor>
        </a-entity>
        
        <!-- MENU CONTAINER - SIMPLE 3D CARDS LIKE DEL PILAR HOTSPOTS -->
        <a-entity id="menu-container" position="0 1.5 -3">
            
            <!-- Battle of Quinga -->
            <a-entity class="menu-option" position="-2.5 0 0" data-site="battle-quinga" data-name="Battle of Quinga">
                <!-- Simple ring like Del Pilar hotspots -->
                <a-ring color="#FF6B6B" radius-inner="0.25" radius-outer="0.35" opacity="0.8"
                    animation="property: scale; to: 1.2 1.2 1; dir: alternate; loop: true; dur: 1200">
                </a-ring>
                <!-- Icon -->
                <a-text value="⚔️" position="0 0.2 0.1" color="white" align="center" scale="2"></a-text>
                <!-- Title -->
                <a-text value="Battle of" position="0 -0.2 0.1" color="white" align="center" width="2" scale="0.8"></a-text>
                <a-text value="Quinga" position="0 -0.5 0.1" color="#FF6B6B" align="center" width="2" scale="1.2"></a-text>
                <!-- Hover effect -->
                <a-circle color="white" radius="0.3" opacity="0" class="hotspot-hover"></a-circle>
            </a-entity>
            
            <!-- Hiyas ng Bulacan Museum -->
            <a-entity class="menu-option" position="-1.2 0 0" data-site="bulacan-museum" data-name="Bulacan Museum">
                <a-ring color="#4ECDC4" radius-inner="0.25" radius-outer="0.35" opacity="0.8"
                    animation="property: scale; to: 1.2 1.2 1; dir: alternate; loop: true; dur: 1200">
                </a-ring>
                <a-text value="🏛️" position="0 0.2 0.1" color="white" align="center" scale="2"></a-text>
                <a-text value="Hiyas ng" position="0 -0.2 0.1" color="white" align="center" width="2" scale="0.8"></a-text>
                <a-text value="Bulacan" position="0 -0.5 0.1" color="#4ECDC4" align="center" width="2" scale="1.2"></a-text>
                <a-circle color="white" radius="0.3" opacity="0" class="hotspot-hover"></a-circle>
            </a-entity>
            
            <!-- Del Pilar Shrine (Center - Highlighted) -->
            <a-entity class="menu-option" position="0 0 0" data-site="del-pilar-shrine" data-name="Del Pilar Shrine">
                <a-ring color="gold" radius-inner="0.3" radius-outer="0.4" opacity="1"
                    animation="property: scale; to: 1.3 1.3 1; dir: alternate; loop: true; dur: 1000">
                </a-ring>
                <a-text value="🗽" position="0 0.25 0.1" color="white" align="center" scale="2.5"></a-text>
                <a-text value="Del Pilar" position="0 -0.2 0.1" color="white" align="center" width="2" scale="0.9"></a-text>
                <a-text value="Shrine" position="0 -0.5 0.1" color="gold" align="center" width="2" scale="1.3"></a-text>
                <a-circle color="white" radius="0.35" opacity="0" class="hotspot-hover"></a-circle>
            </a-entity>
            
            <!-- Barasoain Museum -->
            <a-entity class="menu-option" position="1.2 0 0" data-site="barasoain-museum" data-name="Barasoain Museum">
                <a-ring color="#FF8E53" radius-inner="0.25" radius-outer="0.35" opacity="0.8"
                    animation="property: scale; to: 1.2 1.2 1; dir: alternate; loop: true; dur: 1200">
                </a-ring>
                <a-text value="⛪" position="0 0.2 0.1" color="white" align="center" scale="2"></a-text>
                <a-text value="Barasoain" position="0 -0.2 0.1" color="white" align="center" width="2" scale="0.8"></a-text>
                <a-text value="Museum" position="0 -0.5 0.1" color="#FF8E53" align="center" width="2" scale="1.2"></a-text>
                <a-circle color="white" radius="0.3" opacity="0" class="hotspot-hover"></a-circle>
            </a-entity>
            
            <!-- Casa Real Shrine -->
            <a-entity class="menu-option" position="2.5 0 0" data-site="casa-real-shrine" data-name="Casa Real Shrine">
                <a-ring color="#9B59B6" radius-inner="0.25" radius-outer="0.35" opacity="0.8"
                    animation="property: scale; to: 1.2 1.2 1; dir: alternate; loop: true; dur: 1200">
                </a-ring>
                <a-text value="🏰" position="0 0.2 0.1" color="white" align="center" scale="2"></a-text>
                <a-text value="Casa Real" position="0 -0.2 0.1" color="white" align="center" width="2" scale="0.8"></a-text>
                <a-text value="Shrine" position="0 -0.5 0.1" color="#9B59B6" align="center" width="2" scale="1.2"></a-text>
                <a-circle color="white" radius="0.3" opacity="0" class="hotspot-hover"></a-circle>
            </a-entity>
        </a-entity>
        
        <!-- Simple floor grid -->
        <a-grid position="0 -0.5 -3" width="10" height="10" color="#444" opacity="0.3"></a-grid>
        
        <!-- Ambient light -->
        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="point" intensity="0.8" position="0 2 2"></a-light>
    </a-scene>

    <script>
        // ===================== CONFIGURATION =====================
        const SITES = [
            { id: "del-pilar-shrine", title: "Marcelo H. Del Pilar Shrine", bg: "#del-pilar-bg" },
            { id: "battle-quinga", title: "Battle of Quinga", bg: "#battle-quinga-bg" },
            { id: "bulacan-museum", title: "Hiyas ng Bulacan Museum", bg: "#bulacan-museum-bg" },
            { id: "barasoain-museum", title: "Barasoain Museum", bg: "#barasoain-bg" },
            { id: "casa-real-shrine", title: "Casa Real Shrine", bg: "#casa-real-bg" }
        ];

        // ===================== SIMPLE METRICS SYSTEM =====================
        class SimpleMetrics {
            constructor() {
                this.metrics = {
                    fps: 0,
                    sessionStart: Date.now(),
                    selections: 0,
                    currentSite: 'Del Pilar Shrine'
                };

                this.startMonitoring();
                this.startSessionTimer();
                this.setupMenuInteractions();
                this.createSiteDots();

                // Hide loading screen
                setTimeout(() => {
                    document.getElementById('loading').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading').style.display = 'none';
                    }, 500);
                }, 2000);
            }

            startMonitoring() {
                let frames = 0;
                let lastFPSUpdate = Date.now();

                const updateFPS = () => {
                    frames++;
                    const now = Date.now();

                    if (now - lastFPSUpdate >= 1000) {
                        this.metrics.fps = frames;
                        frames = 0;
                        lastFPSUpdate = now;
                        this.updateDisplay();
                    }

                    requestAnimationFrame(updateFPS);
                };

                updateFPS();
            }

            startSessionTimer() {
                const update = () => {
                    const elapsed = Date.now() - this.metrics.sessionStart;
                    const mins = Math.floor(elapsed / 60000);
                    const secs = Math.floor((elapsed % 60000) / 1000);

                    document.getElementById('session-time').textContent =
                        `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                    setTimeout(update, 1000);
                };
                update();
            }

            createSiteDots() {
                const siteSelector = document.getElementById('site-selector');
                SITES.forEach((site, index) => {
                    const dot = document.createElement('div');
                    dot.className = `site-dot ${index === 0 ? 'active' : ''}`;
                    dot.dataset.index = index;
                    dot.title = site.title;
                    
                    dot.addEventListener('click', () => {
                        this.selectSite(index);
                    });
                    
                    siteSelector.appendChild(dot);
                });
            }

            setupMenuInteractions() {
                const scene = document.querySelector('a-scene');

                // Hover effects - like Del Pilar hotspots
                scene.addEventListener('mouseenter', (e) => {
                    if (e.target.classList.contains('menu-option')) {
                        const hoverCircle = e.target.querySelector('.hotspot-hover');
                        if (hoverCircle) {
                            hoverCircle.setAttribute('opacity', '0.3');
                        }
                    }
                });

                scene.addEventListener('mouseleave', (e) => {
                    if (e.target.classList.contains('menu-option')) {
                        const hoverCircle = e.target.querySelector('.hotspot-hover');
                        if (hoverCircle) {
                            hoverCircle.setAttribute('opacity', '0');
                        }
                    }
                });

                // Click to select site
                scene.addEventListener('click', (e) => {
                    const menuOption = e.target.closest('.menu-option');
                    if (menuOption) {
                        const siteId = menuOption.getAttribute('data-site');
                        const siteName = menuOption.getAttribute('data-name');
                        
                        this.metrics.selections++;
                        this.metrics.currentSite = siteName;
                        
                        document.getElementById('site-name').textContent = `📍 ${siteName}`;
                        document.getElementById('current-site').textContent = siteName;
                        
                        this.updateDisplay();
                        
                        // Find site index and update dots
                        const siteIndex = SITES.findIndex(s => s.id === siteId);
                        if (siteIndex !== -1) {
                            document.querySelectorAll('.site-dot').forEach((dot, i) => {
                                dot.classList.toggle('active', i === siteIndex);
                            });
                        }
                        
                        // Visual feedback - flash the ring
                        const ring = menuOption.querySelector('a-ring');
                        if (ring) {
                            const originalColor = ring.getAttribute('color');
                            ring.setAttribute('color', 'white');
                            setTimeout(() => {
                                ring.setAttribute('color', originalColor);
                            }, 300);
                        }
                        
                        // In a real implementation, you would navigate to the site
                        // window.location.href = `${siteId}/index.html`;
                        alert(`📍 Selected: ${siteName}\n(This would navigate to the site in production)`);
                    }
                });
            }

            selectSite(index) {
                if (index < 0 || index >= SITES.length) return;
                
                const site = SITES[index];
                
                // Update sky background if available
                const sky = document.querySelector('#scene-sky');
                if (sky && site.bg) {
                    sky.setAttribute('src', site.bg);
                }
                
                // Update site info
                this.metrics.currentSite = site.title;
                document.getElementById('site-name').textContent = `📍 ${site.title}`;
                document.getElementById('current-site').textContent = site.title;
                
                // Update site dots
                document.querySelectorAll('.site-dot').forEach((dot, i) => {
                    dot.classList.toggle('active', i === index);
                });
                
                this.updateDisplay();
            }

            updateDisplay() {
                document.getElementById('fps-value').textContent = this.metrics.fps;
                document.getElementById('selection-count').textContent = this.metrics.selections;
            }
        }

        // ===================== NAVIGATION =====================
        function goToMenu() {
            if (confirm("Return to main menu?")) {
                window.location.href = "index.html";
            }
        }

        // ===================== EXPORT FUNCTION =====================
        window.exportData = function () {
            if (typeof metrics === 'undefined') {
                alert('System not initialized yet.');
                return;
            }

            const data = {
                project: "VR Heritage Bulacan",
                timestamp: new Date().toISOString(),
                sessionDuration: Date.now() - metrics.metrics.sessionStart,
                selections: metrics.metrics.selections,
                currentSite: metrics.metrics.currentSite,
                performance: {
                    fps: metrics.metrics.fps
                }
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `vr-heritage-session-${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            alert('✅ Session data exported!');
        };

        // ===================== INITIALIZE =====================
        let metrics;
        document.addEventListener('DOMContentLoaded', function() {
            metrics = new SimpleMetrics();
            
            setTimeout(() => {
                console.log('📍 VR Heritage Main Menu');
                console.log('Click on the colored rings to select a historical site');
            }, 3000);
        });
    </script>
</body>
</html>
