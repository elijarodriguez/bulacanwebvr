<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VR Heritage · Bulacan</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #0a0a0a;
            font-family: 'Inter', sans-serif; 
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Minimal Panel */
        #performance-panel {
            position: fixed; 
            top: 16px; 
            left: 16px;
            right: 16px;
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 12px;
            color: #fff;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        @media (min-width: 640px) {
            #performance-panel {
                top: 20px;
                left: 20px;
                right: auto;
                width: 300px;
            }
        }

        .panel-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
        }

        .panel-row:last-child {
            margin-bottom: 0;
        }

        .panel-value {
            color: #fff;
            font-weight: 500;
            font-size: 14px;
        }

        .panel-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 10px 0;
        }

        .progress-container {
            margin: 8px 0;
        }

        .progress-bar {
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.1s linear;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .metric-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 8px 4px;
            text-align: center;
        }

        .metric-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-number {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-top: 2px;
        }

        /* Minimal Buttons */
        .minimal-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 8px 14px;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            -webkit-appearance: none;
            appearance: none;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .minimal-btn:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.98);
        }

        .minimal-btn i {
            font-size: 12px;
            opacity: 0.7;
        }

        #export-data {
            position: fixed;
            bottom: 80px;
            right: 16px;
            z-index: 1000;
        }

        @media (min-width: 640px) {
            #export-data {
                bottom: 20px;
                right: 20px;
            }
        }

        /* Minimal Instructions */
        #instructions {
            position: fixed; 
            bottom: 16px; 
            left: 16px;
            right: 16px;
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 10px 16px;
            color: #fff;
            z-index: 100;
            display: flex;
            justify-content: space-around;
            gap: 8px;
            font-size: 12px;
            font-weight: 400;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        @media (min-width: 640px) {
            #instructions {
                bottom: 20px;
                left: 50%;
                right: auto;
                transform: translateX(-50%);
                width: auto;
                min-width: 400px;
            }
        }

        .instruction-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.8);
        }

        .instruction-item i {
            font-size: 14px;
            opacity: 0.7;
        }

        /* Selection Feedback */
        #selection-feedback {
            position: fixed; 
            top: 50%; 
            left: 16px;
            right: 16px;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff; 
            padding: 16px; 
            border-radius: 40px;
            font-size: 16px; 
            font-weight: 500; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0; 
            transition: opacity 0.2s; 
            pointer-events: none;
            z-index: 10000; 
            text-align: center;
            max-width: 300px;
            margin: 0 auto;
        }
        
        #selection-feedback.show { 
            opacity: 1; 
        }

        /* Minimal Modal */
        #fps-log-modal {
            position: fixed;
            top: 50%;
            left: 16px;
            right: 16px;
            transform: translateY(-50%);
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            color: #fff;
            z-index: 10000;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            display: none;
            -webkit-overflow-scrolling: touch;
        }

        @media (min-width: 640px) {
            #fps-log-modal {
                top: 50%;
                left: 50%;
                right: auto;
                transform: translate(-50%, -50%);
                width: 600px;
            }
        }

        #fps-log-modal.show {
            display: block;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.2px;
        }

        .close-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px;
            border-radius: 30px;
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            padding: 8px;
            background: none;
            border: none;
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* Minimal Tables */
        .minimal-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .minimal-table th {
            text-align: left;
            padding: 8px 4px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .minimal-table td {
            padding: 8px 4px;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .minimal-table tr:last-child td {
            border-bottom: none;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 16px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }

        .stat-card-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
        }

        .stat-card-value {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        /* VR Mode */
        body.vr-mode #instructions,
        body.vr-mode #performance-panel,
        body.vr-mode #export-data {
            display: none !important;
        }

        /* Loading */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 12px 24px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            z-index: 10001;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div id="loading">
        <i class="fas fa-circle-notch fa-spin" style="margin-right: 8px;"></i>
        Loading...
    </div>

    <!-- Minimal Performance Panel -->
    <div id="performance-panel">
        <div class="panel-row">
            <span>Gaze</span>
            <span class="panel-value" id="gaze-status">● Active</span>
        </div>
        <div class="panel-row">
            <span>Target</span>
            <span class="panel-value" id="hotspot-status">None</span>
        </div>
        <div class="panel-row">
            <span>Dwell</span>
            <span class="panel-value" id="dwell-status">Inactive</span>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="metric-grid">
            <div class="metric-item">
                <div class="metric-label">FPS</div>
                <div class="metric-number" id="fps-display">60</div>
            </div>
            <div class="metric-item">
                <div class="metric-label">Latency</div>
                <div class="metric-number" id="latency-display">0</div>
            </div>
            <div class="metric-item">
                <div class="metric-label">Selections</div>
                <div class="metric-number" id="selection-count">0</div>
            </div>
        </div>

        <div class="panel-divider"></div>

        <div style="display: flex; gap: 8px;">
            <button class="minimal-btn" id="toggle-log-btn" style="flex: 2;">
                <i class="fas fa-chart-bar"></i>
                Logs
            </button>
        </div>
    </div>

    <!-- Export Button -->
    <button class="minimal-btn" id="export-data">
        <i class="fas fa-download"></i>
        Export
    </button>

    <!-- Minimal Instructions -->
    <div id="instructions">
        <div class="instruction-item">
            <i class="fas fa-eye"></i>
            <span>Look</span>
        </div>
        <div class="instruction-item">
            <i class="fas fa-circle-notch"></i>
            <span>Hold</span>
        </div>
        <div class="instruction-item">
            <i class="fas fa-arrow-right"></i>
            <span>Enter</span>
        </div>
    </div>

    <!-- Selection Feedback -->
    <div id="selection-feedback"></div>

    <!-- Minimal Log Modal -->
    <div id="fps-log-modal">
        <div class="modal-header">
            <h3><i class="fas fa-chart-line" style="margin-right: 8px;"></i>Performance Logs</h3>
            <button class="close-btn" onclick="closeLogModal()">&times;</button>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('fps')">FPS</button>
            <button class="tab" onclick="switchTab('latency')">Latency</button>
            <button class="tab" onclick="switchTab('accuracy')">Accuracy</button>
        </div>

        <!-- FPS Tab -->
        <div id="fps-tab" class="tab-content">
            <table class="minimal-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>FPS</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="fps-log-body"></tbody>
            </table>
        </div>

        <!-- Latency Tab -->
        <div id="latency-tab" class="tab-content" style="display: none;">
            <table class="minimal-table">
                <thead>
                    <tr>
                        <th>Trial</th>
                        <th>Latency (ms)</th>
                    </tr>
                </thead>
                <tbody id="latency-log-body"></tbody>
            </table>
        </div>

        <!-- Accuracy Tab -->
        <div id="accuracy-tab" class="tab-content" style="display: none;">
            <table class="minimal-table">
                <thead>
                    <tr>
                        <th>Participant</th>
                        <th>Low</th>
                        <th>Med</th>
                        <th>High</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>P1</td>
                        <td contenteditable="true" class="editable">0/10</td>
                        <td contenteditable="true" class="editable">0/10</td>
                        <td contenteditable="true" class="editable">0/10</td>
                    </tr>
                    <tr>
                        <td>P2</td>
                        <td contenteditable="true" class="editable">0/10</td>
                        <td contenteditable="true" class="editable">0/10</td>
                        <td contenteditable="true" class="editable">0/10</td>
                    </tr>
                    <tr>
                        <td>P3</td>
                        <td contenteditable="true" class="editable">0/10</td>
                        <td contenteditable="true" class="editable">0/10</td>
                        <td contenteditable="true" class="editable">0/10</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-card-label">Avg FPS</div>
                <div class="stat-card-value" id="avg-fps">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-label">Avg Latency</div>
                <div class="stat-card-value" id="avg-latency">0ms</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-label">Stability</div>
                <div class="stat-card-value" id="stability">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-label">Min FPS</div>
                <div class="stat-card-value" id="min-fps">0</div>
            </div>
        </div>
    </div>

    <!-- VR Scene -->
    <a-scene id="scene" 
             vr-mode-ui="enabled: true"
             background="color: #0a0a0a"
             fog="type: exponential; color: #0a0a0a; density: 0.04">
        
        <!-- Camera -->
        <a-entity id="camera" camera="fov: 80" look-controls position="0 1.6 0">
            <a-entity id="vr-cursor" position="0 0 -2">
                <a-ring radius-inner="0.08" radius-outer="0.1" color="#fff" rotation="90 0 0"></a-ring>
                <a-torus id="dwell-ring" radius="0.12" radius-tubular="0.005" 
                         color="#fff" rotation="90 0 0" visible="false"
                         material="transparent: true; opacity: 0.5"></a-torus>
            </a-entity>
            <a-entity id="raycaster" raycaster="objects: .hotspot; far: 20; interval: 100;"></a-entity>
        </a-entity>

        <!-- Title -->
        <a-entity position="0 3 -5">
            <a-text value="BULACAN" color="#fff" align="center" width="6" scale="1.5 1.5 1"></a-text>
            <a-text value="heritage" color="#888" align="center" width="4" scale="0.8 0.8 1" position="0 -0.6 0"></a-text>
        </a-entity>

        <!-- Hotspots -->
        <a-entity position="0 1.5 -4.5">
            <!-- Site 1 -->
            <a-entity class="hotspot" id="site-quinga" data-name="Battle of Quinga"
                      data-file="quinga.html"
                      position="-2.4 0.5 0"
                      geometry="primitive: plane; width: 1.2; height: 1.4"
                      material="color: #222; emissive: #333; transparent: true; opacity: 0.9">
                <a-text value="QUINGA" color="#fff" align="center" scale="0.6" position="0 0.2 0.1"></a-text>
                <a-text value="1896" color="#666" align="center" scale="0.4" position="0 -0.3 0.1"></a-text>
            </a-entity>

            <!-- Site 2 -->
            <a-entity class="hotspot" id="site-museum" data-name="Hiyas Museum"
                      data-file="museum.html"
                      position="-1.2 0.5 0"
                      geometry="primitive: plane; width: 1.2; height: 1.4"
                      material="color: #222; emissive: #333; transparent: true; opacity: 0.9">
                <a-text value="HIYAS" color="#fff" align="center" scale="0.6" position="0 0.2 0.1"></a-text>
                <a-text value="MUSEUM" color="#666" align="center" scale="0.4" position="0 -0.3 0.1"></a-text>
            </a-entity>

            <!-- Site 3 -->
            <a-entity class="hotspot" id="site-delpilar" data-name="Del Pilar Shrine"
                      data-file="delpilar.html"
                      position="0 0.5 0"
                      geometry="primitive: plane; width: 1.2; height: 1.4"
                      material="color: #222; emissive: #333; transparent: true; opacity: 0.9">
                <a-text value="DEL PILAR" color="#fff" align="center" scale="0.5" position="0 0.2 0.1"></a-text>
                <a-text value="SHRINE" color="#666" align="center" scale="0.4" position="0 -0.3 0.1"></a-text>
            </a-entity>

            <!-- Site 4 -->
            <a-entity class="hotspot" id="site-barasoain" data-name="Barasoain Museum"
                      data-file="barasoain.html"
                      position="1.2 0.5 0"
                      geometry="primitive: plane; width: 1.2; height: 1.4"
                      material="color: #222; emissive: #333; transparent: true; opacity: 0.9">
                <a-text value="BARASOAIN" color="#fff" align="center" scale="0.5" position="0 0.2 0.1"></a-text>
                <a-text value="1899" color="#666" align="center" scale="0.4" position="0 -0.3 0.1"></a-text>
            </a-entity>

            <!-- Site 5 -->
            <a-entity class="hotspot" id="site-casareal" data-name="Casa Real Shrine"
                      data-file="casareal.html"
                      position="2.4 0.5 0"
                      geometry="primitive: plane; width: 1.2; height: 1.4"
                      material="color: #222; emissive: #333; transparent: true; opacity: 0.9">
                <a-text value="CASA REAL" color="#fff" align="center" scale="0.5" position="0 0.2 0.1"></a-text>
                <a-text value="1580" color="#666" align="center" scale="0.4" position="0 -0.3 0.1"></a-text>
            </a-entity>
        </a-entity>

        <!-- Floor -->
        <a-circle radius="10" position="0 -0.5 -4.5" rotation="-90 0 0" material="color: #111; emissive: #111"></a-circle>
        
        <!-- Lighting -->
        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="directional" position="2 5 3" intensity="0.8"></a-light>
    </a-scene>

    <script>
        // ==================== CONFIG ====================
        const DWELL_TIME = 1000;

        // State
        let currentHotspot = null;
        let dwellActive = false;
        let dwellTimer = null;
        let dwellStartTime = 0;
        let selectionCount = 0;

        // Performance
        let fpsLogs = [];
        let latencyLogs = [];
        let lastFrameTime = performance.now();
        let sessionStartTime = Date.now();
        let lastSelectionTime = 0;

        // DOM elements
        const hotspotStatus = document.getElementById('hotspot-status');
        const dwellStatus = document.getElementById('dwell-status');
        const progressFill = document.getElementById('progress-fill');
        const selectionCountEl = document.getElementById('selection-count');
        const dwellRing = document.getElementById('dwell-ring');
        const fpsDisplay = document.getElementById('fps-display');
        const latencyDisplay = document.getElementById('latency-display');
        const loading = document.getElementById('loading');

        // ==================== FPS MONITORING ====================
        function measureFPS() {
            const now = performance.now();
            const delta = now - lastFrameTime;
            const currentFPS = Math.round(1000 / delta);
            
            fpsDisplay.textContent = currentFPS;
            
            // Log every 30 seconds
            const elapsed = (now - sessionStartTime) / 1000;
            if (Math.floor(elapsed) % 30 === 0 && Math.floor(elapsed) > 0) {
                const lastLog = fpsLogs[fpsLogs.length - 1];
                if (!lastLog || Math.abs(lastLog.time - elapsed) >= 29) {
                    fpsLogs.push({
                        time: Math.floor(elapsed),
                        fps: currentFPS,
                        isAcceptable: currentFPS >= 30
                    });
                    updateFPSDisplay();
                }
            }
            
            lastFrameTime = now;
        }

        // ==================== LATENCY ====================
        function measureLatency(action) {
            if (action === 'start') {
                lastSelectionTime = Date.now();
            } else if (action === 'end' && lastSelectionTime > 0) {
                const latency = Date.now() - lastSelectionTime;
                latencyLogs.push({
                    trial: latencyLogs.length + 1,
                    latency: latency
                });
                
                const avgLatency = latencyLogs.reduce((a, b) => a + b.latency, 0) / latencyLogs.length;
                latencyDisplay.textContent = Math.round(avgLatency);
                updateLatencyDisplay();
            }
        }

        // ==================== NAVIGATION ====================
        function navigateToSite(hotspot) {
            const siteFile = hotspot.getAttribute('data-file');
            const siteName = hotspot.getAttribute('data-name');
            
            if (siteFile) {
                measureLatency('end');
                
                loading.style.display = 'block';
                
                const feedback = document.getElementById('selection-feedback');
                feedback.textContent = siteName;
                feedback.classList.add('show');
                
                setTimeout(() => {
                    window.location.href = siteFile;
                }, 500);
            }
        }

        // ==================== RAYCASTER ====================
        function setupRaycaster() {
            const scene = document.querySelector('a-scene');
            scene.addEventListener('loaded', () => {
                const raycaster = document.getElementById('raycaster');
                
                raycaster.addEventListener('raycaster-intersection', (evt) => {
                    const hit = evt.detail.intersections[0]?.object.el;
                    if (hit?.classList.contains('hotspot')) {
                        if (currentHotspot !== hit) {
                            currentHotspot = hit;
                            hotspotStatus.textContent = hit.getAttribute('data-name').substring(0, 15);
                            startDwellTimer();
                        }
                    }
                });
                
                raycaster.addEventListener('raycaster-intersection-cleared', () => {
                    if (currentHotspot) {
                        currentHotspot = null;
                        hotspotStatus.textContent = 'None';
                        cancelDwellTimer();
                    }
                });
            });
        }

        // ==================== DWELL ====================
        function startDwellTimer() {
            if (!currentHotspot) return;
            
            measureLatency('start');
            
            if (dwellActive) cancelDwellTimer();
            
            dwellActive = true;
            dwellStartTime = Date.now();
            dwellRing.setAttribute('visible', 'true');
            dwellStatus.textContent = 'Active';
            
            dwellTimer = setInterval(() => {
                const progress = (Date.now() - dwellStartTime) / DWELL_TIME * 100;
                progressFill.style.width = Math.min(progress, 100) + '%';
                
                if (progress >= 100) {
                    completeSelection();
                }
            }, 50);
        }

        function cancelDwellTimer() {
            dwellActive = false;
            if (dwellTimer) clearInterval(dwellTimer);
            dwellRing.setAttribute('visible', 'false');
            dwellStatus.textContent = 'Inactive';
            progressFill.style.width = '0%';
        }

        function completeSelection() {
            if (!currentHotspot) return;
            
            selectionCount++;
            selectionCountEl.textContent = selectionCount;
            navigateToSite(currentHotspot);
            cancelDwellTimer();
        }

        // ==================== LOGS ====================
        function updateFPSDisplay() {
            const tbody = document.getElementById('fps-log-body');
            tbody.innerHTML = '';
            
            fpsLogs.slice(-8).forEach(log => {
                tbody.innerHTML += `
                    <tr>
                        <td>${log.time}s</td>
                        <td>${log.fps}</td>
                        <td style="color: ${log.isAcceptable ? '#4ade80' : '#f87171'}">${log.isAcceptable ? '✓' : '✗'}</td>
                    </tr>
                `;
            });
            
            updateStats();
        }

        function updateLatencyDisplay() {
            const tbody = document.getElementById('latency-log-body');
            tbody.innerHTML = '';
            
            latencyLogs.slice(-6).forEach(log => {
                tbody.innerHTML += `<tr><td>${log.trial}</td><td>${log.latency}ms</td></tr>`;
            });
        }

        function updateStats() {
            if (fpsLogs.length > 0) {
                const fpsValues = fpsLogs.map(l => l.fps);
                const avg = Math.round(fpsValues.reduce((a, b) => a + b, 0) / fpsValues.length);
                const min = Math.min(...fpsValues);
                const stable = Math.round((fpsLogs.filter(l => l.isAcceptable).length / fpsLogs.length) * 100);
                
                document.getElementById('avg-fps').textContent = avg;
                document.getElementById('min-fps').textContent = min;
                document.getElementById('stability').textContent = stable + '%';
            }
            
            const avgLatency = latencyLogs.length ? 
                Math.round(latencyLogs.reduce((a, b) => a + b.latency, 0) / latencyLogs.length) : 0;
            document.getElementById('avg-latency').textContent = avgLatency + 'ms';
        }

        // ==================== UI ====================
        window.openLogModal = () => document.getElementById('fps-log-modal').classList.add('show');
        window.closeLogModal = () => document.getElementById('fps-log-modal').classList.remove('show');
        
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + '-tab').style.display = 'block';
            event.target.classList.add('active');
        };

        document.getElementById('toggle-log-btn').addEventListener('click', openLogModal);
        document.getElementById('export-data').addEventListener('click', () => {
            const data = {
                fps: fpsLogs,
                latency: latencyLogs,
                selections: selectionCount,
                summary: {
                    avgFPS: fpsLogs.length ? Math.round(fpsLogs.reduce((a, b) => a + b.fps, 0) / fpsLogs.length) : 0,
                    avgLatency: latencyLogs.length ? Math.round(latencyLogs.reduce((a, b) => a + b.latency, 0) / latencyLogs.length) : 0
                }
            };
            
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `heritage-data-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        });

        // ==================== INIT ====================
        window.onload = () => {
            setupRaycaster();
            setInterval(measureFPS, 100);
            setTimeout(() => loading.style.display = 'none', 1500);
            
            document.getElementById('gaze-status').innerHTML = '● Active';
            document.getElementById('gaze-status').style.color = '#4ade80';
        };
    </script>
</body>
</html>
