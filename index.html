<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR Heritage · Bulacan | Main Menu</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background-color: #1a0f0c; font-family: 'Cormorant Garamond', serif; }
        
        /* Performance Panel */
        #performance-panel {
            position: fixed; top: 20px; left: 20px;
            background: rgba(26,15,12,0.95); backdrop-filter: blur(10px);
            border: 2px solid #d4af37; border-radius: 15px;
            padding: 20px; color: #e4d5b9; z-index: 1000;
            width: 300px; box-shadow: 0 0 30px rgba(212,175,55,0.3);
        }
        .status-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 16px; }
        .status-label { color: #b8860b; }
        .status-value { color: #d4af37; font-weight: bold; }
        .progress-bar {
            width: 100%; height: 10px; background: #2c1810;
            border-radius: 5px; overflow: hidden; margin: 15px 0;
            border: 1px solid #d4af37;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #d4af37, #ffffff);
            width: 0%; transition: width 0.1s linear;
        }
        
        /* Instructions */
        #instructions {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(26,15,12,0.95); backdrop-filter: blur(10px);
            border: 2px solid #d4af37; border-radius: 50px;
            padding: 15px 40px; color: #e4d5b9; z-index: 100;
            display: flex; gap: 40px; font-size: 18px;
        }
        .instruction-item { display: flex; align-items: center; gap: 10px; }
        
        /* Selection Feedback */
        #selection-feedback {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #d4af37, #b8860b);
            color: #1a0f0c; padding: 30px 60px; border-radius: 80px;
            font-size: 32px; font-weight: bold; border: 4px solid white;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
            z-index: 10000; white-space: nowrap; box-shadow: 0 0 50px gold;
        }
        #selection-feedback.show { opacity: 1; }
        
        /* VR Mode */
        body.vr-mode #instructions,
        body.vr-mode #performance-panel {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Performance Panel - Simplified for gaze-only -->
    <div id="performance-panel">
        <div class="status-row">
            <span class="status-label">🏛️ MENU:</span>
            <span class="status-value">5 Historical Sites</span>
        </div>
        <div class="status-row">
            <span class="status-label">👆 Gaze:</span>
            <span class="status-value" id="gaze-status">● Active</span>
        </div>
        <div class="status-row">
            <span class="status-label">🎯 Target:</span>
            <span class="status-value" id="hotspot-status">None</span>
        </div>
        <div class="status-row">
            <span class="status-label">⏱️ Dwell:</span>
            <span class="status-value" id="dwell-status">Inactive</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="status-row">
            <span class="status-label">✅ Selections:</span>
            <span class="status-value" id="selection-count">0</span>
        </div>
    </div>

    <!-- Instructions -->
    <div id="instructions">
        <div class="instruction-item">👀 Look at a site</div>
        <div class="instruction-item">⏱️ Hold gaze for 1s</div>
        <div class="instruction-item">📍 Enter the experience</div>
    </div>

    <!-- Selection Feedback -->
    <div id="selection-feedback"></div>

    <!-- VR Scene - Main Menu -->
    <a-scene id="scene" 
             vr-mode-ui="enabled: true"
             background="color: #1a0f0c"
             fog="type: exponential; color: #1a0f0c; density: 0.04">
        
        <!-- Camera with cursor - gaze only -->
        <a-entity id="camera" camera="fov: 80" look-controls position="0 1.6 0">
            <a-entity id="vr-cursor" position="0 0 -2">
                <a-torus id="cursor-ring" radius="0.12" radius-tubular="0.015" 
                         color="#d4af37" rotation="90 0 0"
                         material="emissive: #d4af37; emissiveIntensity: 0.5"></a-torus>
                <a-sphere radius="0.04" color="#e4d5b9" position="0 0 0"
                         material="emissive: #ffffff; emissiveIntensity: 0.3"></a-sphere>
                <a-torus id="dwell-ring" radius="0.15" radius-tubular="0.02" 
                         color="#ffffff" rotation="90 0 0" visible="false"
                         material="emissive: #ffffff; emissiveIntensity: 1; opacity: 0.9"></a-torus>
            </a-entity>
            <a-entity id="raycaster" raycaster="objects: .hotspot; far: 20; interval: 100;"></a-entity>
        </a-entity>

        <!-- Title -->
        <a-entity position="0 3 -5">
            <a-text value="HISTORICAL BULACAN" color="#d4af37" align="center" width="8" scale="2 2 1"></a-text>
            <a-text value="Choose a Site to Explore" color="#b8860b" align="center" width="8" scale="1.2 1.2 1" position="0 -0.8 0"></a-text>
        </a-entity>

        <!-- 5 Historical Site Hotspots -->
        <a-entity position="0 1.5 -4.5">
            <!-- Site 1: Battle of Quinga -->
            <a-entity class="hotspot" id="site-quinga" data-site="quinga" data-name="Battle of Quinga"
                      data-file="quinga.html"
                      position="-2.8 0.5 0"
                      geometry="primitive: box; width: 1.6; height: 1.8; depth: 0.3"
                      material="color: #2c1810; emissive: #8b4513; emissiveIntensity: 0.3">
                <a-entity position="0 0.5 0.2">
                    <a-text value="⚔️" color="#d4af37" align="center" scale="2"></a-text>
                </a-entity>
                <a-entity position="0 0 0.2">
                    <a-text value="BATTLE OF" color="#e4d5b9" align="center" scale="0.9"></a-text>
                </a-entity>
                <a-entity position="0 -0.4 0.2">
                    <a-text value="QUINGA" color="#d4af37" align="center" scale="1.2"></a-text>
                </a-entity>
                <a-entity position="0 -0.9 0.2">
                    <a-text value="1896" color="#b8860b" align="center" scale="0.8"></a-text>
                </a-entity>
            </a-entity>

            <!-- Site 2: Hiyas Museum -->
            <a-entity class="hotspot" id="site-museum" data-site="museum" data-name="Hiyas ng Bulacan Museum"
                      data-file="museum.html"
                      position="-1.4 0.5 0"
                      geometry="primitive: box; width: 1.6; height: 1.8; depth: 0.3"
                      material="color: #2c1810; emissive: #004d4d; emissiveIntensity: 0.3">
                <a-entity position="0 0.5 0.2">
                    <a-text value="🏛️" color="#d4af37" align="center" scale="2"></a-text>
                </a-entity>
                <a-entity position="0 0 0.2">
                    <a-text value="HIYAS NG" color="#e4d5b9" align="center" scale="0.9"></a-text>
                </a-entity>
                <a-entity position="0 -0.4 0.2">
                    <a-text value="BULACAN" color="#d4af37" align="center" scale="1.1"></a-text>
                </a-entity>
                <a-entity position="0 -0.9 0.2">
                    <a-text value="MUSEUM" color="#b8860b" align="center" scale="0.9"></a-text>
                </a-entity>
            </a-entity>

            <!-- Site 3: Del Pilar Shrine -->
            <a-entity class="hotspot" id="site-delpilar" data-site="delpilar" data-name="Marcelo H. Del Pilar Shrine"
                      data-file="delpilar.html"
                      position="0 0.5 0"
                      geometry="primitive: box; width: 1.6; height: 1.8; depth: 0.3"
                      material="color: #2c1810; emissive: #665d1e; emissiveIntensity: 0.3">
                <a-entity position="0 0.5 0.2">
                    <a-text value="🗽" color="#d4af37" align="center" scale="2"></a-text>
                </a-entity>
                <a-entity position="0 0 0.2">
                    <a-text value="DEL PILAR" color="#e4d5b9" align="center" scale="0.9"></a-text>
                </a-entity>
                <a-entity position="0 -0.4 0.2">
                    <a-text value="SHRINE" color="#d4af37" align="center" scale="1.2"></a-text>
                </a-entity>
                <a-entity position="0 -0.9 0.2">
                    <a-text value="MARCELO H." color="#b8860b" align="center" scale="0.7"></a-text>
                </a-entity>
            </a-entity>

            <!-- Site 4: Barasoain Museum -->
            <a-entity class="hotspot" id="site-barasoain" data-site="barasoain" data-name="Barasoain Museum"
                      data-file="barasoain.html"
                      position="1.4 0.5 0"
                      geometry="primitive: box; width: 1.6; height: 1.8; depth: 0.3"
                      material="color: #2c1810; emissive: #8b4513; emissiveIntensity: 0.3">
                <a-entity position="0 0.5 0.2">
                    <a-text value="⛪" color="#d4af37" align="center" scale="2"></a-text>
                </a-entity>
                <a-entity position="0 0 0.2">
                    <a-text value="BARASOAIN" color="#e4d5b9" align="center" scale="0.9"></a-text>
                </a-entity>
                <a-entity position="0 -0.4 0.2">
                    <a-text value="MUSEUM" color="#d4af37" align="center" scale="1.1"></a-text>
                </a-entity>
                <a-entity position="0 -0.9 0.2">
                    <a-text value="1899" color="#b8860b" align="center" scale="0.8"></a-text>
                </a-entity>
            </a-entity>

            <!-- Site 5: Casa Real Shrine -->
            <a-entity class="hotspot" id="site-casareal" data-site="casareal" data-name="Casa Real Shrine"
                      data-file="casareal.html"
                      position="2.8 0.5 0"
                      geometry="primitive: box; width: 1.6; height: 1.8; depth: 0.3"
                      material="color: #2c1810; emissive: #4a2c1a; emissiveIntensity: 0.3">
                <a-entity position="0 0.5 0.2">
                    <a-text value="🏰" color="#d4af37" align="center" scale="2"></a-text>
                </a-entity>
                <a-entity position="0 0 0.2">
                    <a-text value="CASA REAL" color="#e4d5b9" align="center" scale="0.9"></a-text>
                </a-entity>
                <a-entity position="0 -0.4 0.2">
                    <a-text value="SHRINE" color="#d4af37" align="center" scale="1.2"></a-text>
                </a-entity>
                <a-entity position="0 -0.9 0.2">
                    <a-text value="1580" color="#b8860b" align="center" scale="0.8"></a-text>
                </a-entity>
            </a-entity>
        </a-entity>

        <!-- Floor -->
        <a-grid position="0 -0.5 -4.5" width="12" height="12" color="#8b5a2b" opacity="0.2"></a-grid>
        
        <!-- Lighting -->
        <a-light type="ambient" intensity="1.5" color="#e4d5b9"></a-light>
        <a-light type="directional" position="2 5 3" intensity="1.2" color="#d4af37"></a-light>
    </a-scene>

    <script>
        // ==================== CONFIG ====================
        const DWELL_TIME = 1000; // 1 second

        // State
        let currentHotspot = null;
        let dwellActive = false;
        let dwellTimer = null;
        let dwellStartTime = 0;
        let selectionCount = 0;

        // DOM elements
        const hotspotStatus = document.getElementById('hotspot-status');
        const dwellStatus = document.getElementById('dwell-status');
        const progressFill = document.getElementById('progress-fill');
        const selectionCountEl = document.getElementById('selection-count');
        const dwellRing = document.getElementById('dwell-ring');
        const cursorRing = document.getElementById('cursor-ring');

        // ==================== NAVIGATION FUNCTION ====================
        function navigateToSite(hotspot) {
            const siteFile = hotspot.getAttribute('data-file');
            const siteName = hotspot.getAttribute('data-name');
            
            if (siteFile) {
                // Show selection feedback
                const feedback = document.getElementById('selection-feedback');
                feedback.textContent = `📍 Entering ${siteName}...`;
                feedback.classList.add('show');
                
                // Short delay then navigate
                setTimeout(() => {
                    window.location.href = siteFile;
                }, 500);
            }
        }

        // ==================== RAYCASTER SETUP ====================
        function setupRaycaster() {
            const scene = document.querySelector('a-scene');
            scene.addEventListener('loaded', () => {
                const raycaster = document.getElementById('raycaster');
                
                raycaster.addEventListener('raycaster-intersection', (evt) => {
                    const intersections = evt.detail.intersections;
                    if (intersections && intersections.length > 0) {
                        const hit = intersections[0].object.el;
                        if (hit && hit.classList.contains('hotspot')) {
                            
                            if (currentHotspot !== hit) {
                                currentHotspot = hit;
                                const siteName = hit.getAttribute('data-name');
                                hotspotStatus.textContent = siteName;
                                cursorRing.setAttribute('color', '#ffffff');
                                
                                // Start dwell timer immediately when gazing at a hotspot
                                startDwellTimer();
                            }
                        }
                    }
                });
                
                raycaster.addEventListener('raycaster-intersection-cleared', () => {
                    if (currentHotspot) {
                        currentHotspot = null;
                        hotspotStatus.textContent = 'None';
                        cursorRing.setAttribute('color', '#d4af37');
                        cancelDwellTimer();
                    }
                });
            });
        }

        // ==================== DWELL LOGIC ====================
        function startDwellTimer() {
            if (!currentHotspot) return;
            
            // Cancel any existing timer
            if (dwellActive) {
                cancelDwellTimer();
            }
            
            dwellActive = true;
            dwellStartTime = Date.now();
            dwellRing.setAttribute('visible', 'true');
            cursorRing.setAttribute('color', '#00ff00');
            dwellStatus.textContent = 'Active';
            
            if (dwellTimer) clearInterval(dwellTimer);
            
            dwellTimer = setInterval(() => {
                const elapsed = Date.now() - dwellStartTime;
                const progress = Math.min((elapsed / DWELL_TIME) * 100, 100);
                
                progressFill.style.width = progress + '%';
                dwellRing.setAttribute('rotation', { x: 90, y: progress * 3.6, z: 0 });
                
                if (progress >= 100) {
                    completeSelection();
                }
            }, 50);
        }

        function cancelDwellTimer() {
            dwellActive = false;
            if (dwellTimer) {
                clearInterval(dwellTimer);
                dwellTimer = null;
            }
            dwellRing.setAttribute('visible', 'false');
            cursorRing.setAttribute('color', '#d4af37');
            dwellStatus.textContent = 'Inactive';
            progressFill.style.width = '0%';
        }

        function completeSelection() {
            if (!currentHotspot) {
                cancelDwellTimer();
                return;
            }
            
            selectionCount++;
            selectionCountEl.textContent = selectionCount;
            
            // Navigate to the selected site
            navigateToSite(currentHotspot);
            
            cancelDwellTimer();
        }

        // ==================== VR MODE ====================
        document.getElementById('scene').addEventListener('enter-vr', () => {
            document.body.classList.add('vr-mode');
        });
        
        document.getElementById('scene').addEventListener('exit-vr', () => {
            document.body.classList.remove('vr-mode');
        });

        // ==================== INIT ====================
        window.onload = () => {
            setupRaycaster();
            
            // Set gaze status to active
            document.getElementById('gaze-status').innerHTML = '● Active';
            document.getElementById('gaze-status').style.color = '#4ECDC4';
        };
    </script>
</body>
</html>
